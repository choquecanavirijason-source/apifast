services:
  # MySQL opcional (desactivado: el backend usa SQLite, ver servicio backend).
  # database:
  #   image: mysql:8.0
  #   container_name: "elashes-database"
  #   environment:
  #     MYSQL_DATABASE: "elashes"
  #     MYSQL_USER: "admin"
  #     MYSQL_PASSWORD: "password"
  #     MYSQL_ROOT_PASSWORD: "password"
  #   ports:
  #     - "3307:3306"
  #   volumes:
  #     - './mysql:/var/lib/mysql'
  #   networks:
  #     - app-network

  # --- Backend (Python) — SQLite en /app/elashes.db (persistido con el volumen ./elashesbackend) ---
  backend:
    image: proyect-elashes-backend:latest
    container_name: "elashes-backend"
    restart: always
    volumes:
      - ./elashesbackend:/app
    ports:
      - "8000:8000"
    environment:
      # Sin DB_HOST → Settings usaría sqlite en carpeta del proyecto; en Docker fijamos ruta explícita:
      - DATABASE_URL=sqlite:////app/elashes.db
      - SECRET_KEY=tu_clave_secreta_aqui
    networks:
      - app-network

  # --- Frontend (React) ---
  frontend:
    build: ./adminElashes
    container_name: "elashes-frontend"
    ports:
      - "3000:80"
    stdin_open: true
    tty: true
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
