info:
  name: Listar usuarios
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/admin/users"
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        const id = res.body[0].res
        bru.setEnvVar("userId", id)

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
