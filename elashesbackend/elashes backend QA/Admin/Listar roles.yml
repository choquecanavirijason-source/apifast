info:
  name: Listar roles
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/admin/roles"
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        const id = res.body[0].id
        bru.setEnvVar("roleId", id)

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
