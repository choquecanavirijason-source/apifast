info:
  name: Listar permisos
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/admin/permissions"
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        const id = res.body[0].res
        bru.setEnvVar("permissionId", id)

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
