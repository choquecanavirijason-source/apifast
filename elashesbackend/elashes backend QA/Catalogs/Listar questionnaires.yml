info:
  name: Listar questionnaires
  type: http
  seq: 5

http:
  method: GET
  url: "{{baseUrl}}/catalogs/questionnaires"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const id = res.body[0].id
        bru.setEnvVar("questionnaireId", id)

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
