info:
  name: Listar effects
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/catalogs/effects"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const id = res.body[0].id
        bru.setEnvVar("effectId", id)

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
