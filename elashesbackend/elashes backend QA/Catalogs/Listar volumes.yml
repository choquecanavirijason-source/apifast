info:
  name: Listar volumes
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/catalogs/volumes"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const id = res.body[0].id
        bru.setEnvVar("volumeId", id)

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
