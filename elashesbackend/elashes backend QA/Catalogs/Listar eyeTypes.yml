info:
  name: Listar eyeTypes
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/catalogs/eye-types"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status === 200){
          const id = res.body[0].id;
          bru.setEnvVar("eyeTypeId", id)
          console.log(id)
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
