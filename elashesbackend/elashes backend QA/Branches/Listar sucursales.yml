info:
  name: Listar sucursales
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/branches/"
  headers:
    - name: Authorization
      value: "{{token}}"
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        const id = res.body[0].id
        bru.setEnvVar("branchId", id)

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
